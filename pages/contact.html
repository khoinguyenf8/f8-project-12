<div class="contact">
    <div class="container">
        <div class="contact__inner">
            <h1 class="contact__inner--heading">Let’s talk with us easily</h1>
            <div class="contact__inner--group">
                <div class="row">
                    <div class="col-5">
                        <label for="first-name" class="contact__form--label">Your first name</label>
                        <form class="contact__form">
                            <input type="text" id="first-name" class="contact__form--input" />
                        </form>
                    </div>

                    <div class="col-5">
                        <label for="last-name" class="contact__form--label">Your last name</label>
                        <form class="contact__form">
                            <input type="text" id="last-name" class="contact__form--input" />
                        </form>
                    </div>
                </div>

                <div class="row">
                    <div class="col-5">
                        <label for="email" class="contact__form--label">Your email address</label>
                        <form class="contact__form">
                            <input type="email" id="email" class="contact__form--input" />
                        </form>
                    </div>

                    <div class="col-5">
                        <label for="phone" class="contact__form--label">Your phone number</label>
                        <form class="contact__form">
                            <input type="number" id="phone" class="contact__form--input" />
                        </form>
                    </div>
                </div>
            </div>

            <p class="contact__inner--desc">I want to learn</p>
            <ul class="contact__inner--list">
                <li class="contact__inner--item">
                    <input type="radio" class="contact__inner--checkbox" name="check" id="design" checked />
                    <label class="contact__inner--text" for="design">Design</label>
                </li>
                <li class="contact__inner--item">
                    <input type="radio" class="contact__inner--checkbox" name="check" id="development" />
                    <label class="contact__inner--text" for="development">Development</label>
                </li>
                <li class="contact__inner--item">
                    <input type="radio" class="contact__inner--checkbox" name="check" id="marketing" />
                    <label class="contact__inner--text" for="marketing">Marketing</label>
                </li>
                <li class="contact__inner--item">
                    <input type="radio" class="contact__inner--checkbox" name="check" id="other" />
                    <label class="contact__inner--text" for="other">Other</label>
                </li>
            </ul>

            <div class="row">
                <div class="col-10">
                    <textarea
                        name=""
                        id=""
                        class="contact__inner--message"
                        placeholder="Write your messages"
                    ></textarea>
                </div>
            </div>

            <div class="contact__inner--btn btn"><a href="#!" class="btn--text">Send Message</a></div>
        </div>
    </div>
</div>
